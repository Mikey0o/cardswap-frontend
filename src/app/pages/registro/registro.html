<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2>Crea una cuenta</h2>
  
  <form (ngSubmit)="onSubmit()">
    
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Nombre:</label>
      <input type="text" name="nombre" [(ngModel)]="nuevoUsuario.nombre" required style="width: 100%; padding: 8px; box-sizing: border-box;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Edad:</label>
      <input type="number" name="edad" [(ngModel)]="nuevoUsuario.edad" required style="width: 100%; padding: 8px; box-sizing: border-box;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Correo Electrónico:</label>
      <input type="email" name="mail" [(ngModel)]="nuevoUsuario.mail" required style="width: 100%; padding: 8px; box-sizing: border-box;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Contraseña:</label>
      <input type="password" name="pass" [(ngModel)]="nuevoUsuario.pass" required style="width: 100%; padding: 8px; box-sizing: border-box;">
    </div>

    @if (errorMensaje) {
      <p style="color: red; font-size: 14px;">{{ errorMensaje }}</p>
    }
    @if (exitoMensaje) {
      <p style="color: green; font-size: 14px;">{{ exitoMensaje }}</p>
    }

    <button type="submit" style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
      Registrar
    </button>
  </form>

  <p style="margin-top: 15px; text-align: center;">
    ¿Ya tiene una cuenta? <a routerLink="/login">Inicia sesión</a>
  </p>
</div>
